# =============================================================================
# webroot.yaml — Universal Webroot Configuration
# =============================================================================
#
# PROPOSAL: A platform-neutral deployment config standard for static and
# JAMstack sites, designed to replace (or generate) platform-specific files:
#
#   Platform        File(s) replaced
#   ──────────────  ──────────────────────────────────────────
#   Netlify         netlify.toml, _redirects, _headers
#   Vercel          vercel.json + next.config.js (hosting layer)
#   Firebase        firebase.json (hosting section)
#   Cloudflare      _headers, _redirects, wrangler.toml (routing)
#
# FALLBACK CHAIN (resolved at build time or by a webroot-aware CLI tool):
#   1. {repo-root}/webroot.yaml       ← site-specific overrides
#   2. ModelEarth/docker/webroot.yaml ← shared org-wide defaults (this file)
#
# This mirrors how .env cascades: secrets live in docker/.env,
# public routing/hosting config lives here in docker/webroot.yaml.
# Site-specific repos only need a webroot.yaml when they override defaults.
#
# SVELTIA CMS MAPPING:
#   app_title      → site.title (passed to CMS at runtime via config.yaml)
#   inline_editor  → cms.inline_editor (runtime JS flag, not hosting config)
#   logo.*         → cms.logo (runtime config.yaml / themes/index.html)
#   extra_css      → cms.extra_css (proxied via rewrites below)
#   extra_js       → cms.extra_js  (proxied via rewrites below)
#
# USAGE:
#   A webroot-aware deploy script reads this file and emits the correct
#   platform-specific config. Example:
#     npx webroot-deploy --target netlify
#     npx webroot-deploy --target vercel
#     npx webroot-deploy --target firebase
# =============================================================================


# -----------------------------------------------------------------------------
# SITE IDENTITY
# Override in the repo-level webroot.yaml for each site.
# -----------------------------------------------------------------------------
site:
  title: "ModelEarth"
  description: "Open-source environmental data platform"
  base_url: "https://model.earth"
  # Firebase: matches "site" in firebase.json (multi-site projects)
  # Netlify:  matches site name in Netlify UI
  # Vercel:   matches project name in vercel.json
  platform_id: "modelearth-default"


# -----------------------------------------------------------------------------
# CMS — Sveltia CMS / Decap CMS runtime config
# These values are injected into config.yaml at deploy time, not served
# as hosting config. Kept here so a single webroot.yaml is the one source
# of truth for both hosting and CMS behavior.
# -----------------------------------------------------------------------------
cms:
  app_title: "ModelEarth Editor"
  inline_editor: true
  logo:
    show_in_header: false
    show_in_intro: false
  extra_css:
    - "/localsite/css/base.css"
  extra_js:
    - "/localsite/js/localsite.js?showheader=true&showsearch=false"
  # Config cache TTL in seconds — short so editors see updates quickly.
  # Emitted as Cache-Control on /config.yaml in the headers section below.
  config_cache_ttl: 60


# -----------------------------------------------------------------------------
# BUILD
# Equivalent to [build] in netlify.toml and buildCommand/outputDirectory
# in vercel.json. For ModelEarth's static/JAMstack repos, build is often
# a no-op ("." = serve repo root directly).
# -----------------------------------------------------------------------------
build:
  command: ""           # e.g. "npm run build" — empty = no build step
  publish: "."          # output dir: "dist", "build", "out", or "." for static
  base: ""              # monorepo subdir — empty = repo root
  node_version: "20"
  ignore:
    - ".env"
    - ".env.*"
    - "firebase.json"
    - "**/.*"
    - "**/node_modules/**"
    - "**/docker-compose*.yml"
    - "**/__pycache__/**"
    - "**/target/**"
    - "**/Dockerfile*"

  # Context-specific build overrides (mirrors netlify.toml [context.*])
  contexts:
    production:
      command: ""
    preview:
      command: ""
    branch:
      command: ""


# -----------------------------------------------------------------------------
# HOSTING BEHAVIOR
# Equivalent to cleanUrls / trailingSlash in vercel.json and firebase.json,
# and prettify in netlify.toml.
# -----------------------------------------------------------------------------
hosting:
  clean_urls: true        # /about instead of /about.html
  trailing_slash: false   # strip trailing slashes
  spa_fallback: true      # serve index.html for unmatched routes (SPA mode)
  spa_fallback_file: "/index.html"


# -----------------------------------------------------------------------------
# REDIRECTS
# Equivalent to [[redirects]] in netlify.toml and "redirects" in vercel.json.
#
# Fields:
#   from        source path (supports :splat and * wildcards)
#   to          destination path or URL
#   status      HTTP status code (301, 302, 200 for rewrite/proxy)
#   force       if true, redirect even when the source file exists (Netlify: force=true)
#   conditions  optional map of conditions (e.g. branch, cookie, country)
# -----------------------------------------------------------------------------
redirects:

  - from: "/admin"
    to: "/admin/index.html"
    status: 301

  - from: "/index.html"
    to: "/"
    status: 301

  # Redirect old /localsite/* paths to canonical origin.
  # Remove if localsite is served via proxy rewrite instead (see below).
  - from: "/localsite/:splat"
    to: "https://model.earth/localsite/:splat"
    status: 302

  # Branch-specific redirect example — only active on staging branch.
  # Uncomment and adapt per repo as needed.
  # - from: "/api/*"
  #   to: "https://staging-api.model.earth/:splat"
  #   status: 200
  #   conditions:
  #     branch: "staging"


# -----------------------------------------------------------------------------
# REWRITES (proxy rules — status 200, URL unchanged in browser)
# Equivalent to rewrite entries in netlify.toml and vercel.json.
# Listed after redirects; redirects take precedence.
# -----------------------------------------------------------------------------
rewrites:

  # Proxy /localsite/css and /localsite/js so Sveltia CMS can load
  # extra_css and extra_js from the shared localsite repo at runtime.
  - from: "/localsite/*"
    to: "https://model.earth/localsite/:splat"
    status: 200

  # Token-vending microservice — routes /api/token/* to the Rust/Axum
  # broker on Cloud Run, keeping API keys out of client-side code.
  - from: "/api/token/*"
    to: "function:tokenVendor"
    status: 200

  # EPA FLOWSA data proxy — avoids CORS issues in browser fetch calls.
  - from: "/api/epa/*"
    to: "https://api.edap-cluster.com/:splat"
    status: 200

  # BEA API proxy — API key stays server-side only.
  - from: "/api/bea/*"
    to: "function:beaProxy"
    status: 200

  # SPA fallback — must be last. Equivalent to Netlify's /* → /index.html
  # with status=200, and Vercel's implicit SPA handling.
  - from: "/*"
    to: "/index.html"
    status: 200
    spa_fallback: true    # hint to emitters: skip if hosting.spa_fallback handles it


# -----------------------------------------------------------------------------
# HEADERS
# Equivalent to [[headers]] in netlify.toml and "headers" in vercel.json.
#
# Fields:
#   for       path pattern (supports wildcards)
#   values    map of header key → value
# -----------------------------------------------------------------------------
headers:

  # Security headers — applied to all routes
  - for: "/**"
    values:
      X-Frame-Options: "SAMEORIGIN"
      X-Content-Type-Options: "nosniff"
      X-XSS-Protection: "1; mode=block"
      Referrer-Policy: "strict-origin-when-cross-origin"
      Permissions-Policy: "geolocation=(), microphone=(), camera=()"
      Strict-Transport-Security: "max-age=31536000; includeSubDomains; preload"
      Content-Security-Policy: >-
        default-src 'self';
        script-src 'self' 'unsafe-inline' 'unsafe-eval'
          https://cdn.jsdelivr.net https://unpkg.com;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src 'self' https://fonts.gstatic.com;
        img-src 'self' data: https:;
        connect-src 'self'
          https://api.github.com
          https://*.supabase.co
          https://*.pinecone.io
          https://api.anthropic.com
          https://api.openai.com
          https://api.x.ai
          https://generativelanguage.googleapis.com
          https://api.edap-cluster.com
          https://apps.bea.gov;

  # Long cache for versioned/hashed static assets
  - for: "/static/**"
    values:
      Cache-Control: "public, max-age=31536000, immutable"

  # Fonts — long cache + open CORS for cross-origin font loading
  - for: "/fonts/**"
    values:
      Cache-Control: "public, max-age=31536000, immutable"
      Access-Control-Allow-Origin: "*"

  # Service worker — always revalidate
  - for: "/sw.js"
    values:
      Cache-Control: "public, max-age=0, must-revalidate"

  # Sveltia CMS admin panel — no indexing, no caching
  - for: "/admin/**"
    values:
      X-Robots-Tag: "noindex, nofollow"
      Cache-Control: "no-store"

  # CMS config — short cache so editors receive updates quickly
  # TTL driven by cms.config_cache_ttl above
  - for: "/config.yaml"
    values:
      Cache-Control: "public, max-age=60, must-revalidate"
      Content-Type: "application/yaml"

  # Data files — moderate cache + open CORS for cross-repo data loading
  - for: "/**/*.{json,csv,yaml,yml}"
    values:
      Cache-Control: "public, max-age=300, stale-while-revalidate=600"
      Access-Control-Allow-Origin: "*"

  # API responses — no cache, open CORS for JAMstack fetch calls
  - for: "/api/**"
    values:
      Cache-Control: "no-store"
      Access-Control-Allow-Origin: "*"
      Access-Control-Allow-Methods: "GET, POST, OPTIONS"
      Access-Control-Allow-Headers: "Content-Type, Authorization"

  # SharedArrayBuffer support for WASM / collaborative embeds
  - for: "/embed/**"
    values:
      Cross-Origin-Embedder-Policy: "require-corp"
      Cross-Origin-Opener-Policy: "same-origin"


# -----------------------------------------------------------------------------
# FUNCTIONS
# Serverless function configuration.
# Equivalent to [functions] in netlify.toml and "functions" in vercel.json.
# -----------------------------------------------------------------------------
functions:
  directory: "functions"
  runtime: "nodejs20"
  # Per-function overrides
  routes:
    - match: "/api/token/**"
      name: "tokenVendor"
      max_duration: 10      # seconds
      memory: 256           # MB
    - match: "/api/bea/**"
      name: "beaProxy"
      max_duration: 15
      memory: 256


# -----------------------------------------------------------------------------
# ENVIRONMENT
# Non-secret environment variables safe to commit.
# Secrets belong in .env (docker/.env for org-wide, repo/.env for overrides).
# Equivalent to [build.environment] in netlify.toml and "env" in vercel.json.
# -----------------------------------------------------------------------------
environment:
  production:
    NODE_ENV: "production"
    SITE_ENV: "production"
    RAG_ENABLED: "true"
    RAG_TOP_K: "6"
  preview:
    NODE_ENV: "development"
    SITE_ENV: "preview"
    RAG_ENABLED: "true"
  development:
    NODE_ENV: "development"
    SITE_ENV: "local"
    RAG_ENABLED: "false"


# -----------------------------------------------------------------------------
# DEV SERVER
# Local development server config.
# Equivalent to [dev] in netlify.toml and devCommand in vercel.json.
# Emulator ports mirror ALLOWED_ORIGINS in docker/.env.
# -----------------------------------------------------------------------------
dev:
  port: 8887
  target_port: 3000       # port your framework dev server runs on
  command: ""             # e.g. "npm run dev" — empty = static file server
  # Additional local ports (emulators, API servers)
  # These mirror SERVER_PORT and ARTS_ENGINE_PORT in docker/.env
  services:
    api: 8081
    arts_engine: 8082
    functions: 5001
    auth: 9099
    storage: 9199
    ui: 4000


# -----------------------------------------------------------------------------
# I18N — future multi-language support
# -----------------------------------------------------------------------------
i18n:
  enabled: false
  default_locale: "en"
  locales:
    - "en"
  root: "/en"


# -----------------------------------------------------------------------------
# PLUGINS / INTEGRATIONS
# Extensibility hook — equivalent to [[plugins]] in netlify.toml.
# Uncomment as ModelEarth tooling grows.
# -----------------------------------------------------------------------------
plugins: []
